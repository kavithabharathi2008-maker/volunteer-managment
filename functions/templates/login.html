{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-center fw-bold mb-4">Login</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select" required>
                        <option value="NGO">NGO</option>
                        <option value="Volunteer">Volunteer</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Optional for demo">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
            </form>
            <p class="text-center mt-4">Don't have an account? <a href="/register">Register here</a></p>
            <hr>
            <div class="text-muted small">
                <p class="mb-1">Demo Accounts:</p>
                <ul>
                    <li>admin@example.com (Admin)</li>
                    <li>Register a new NGO or Volunteer to test.</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
